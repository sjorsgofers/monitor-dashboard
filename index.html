<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920, initial-scale=1" />
  <title>Zusje Roermond Dashboard</title>
  <style>
    :root{
      --bg:#000000;
      --panel:#090909;
      --panel2:#050505;
      --gold:#c8a45b;
      --white:#ffffff;
      --muted:#b8b8b8;
      --red:#ff4d4f;
      --green:#3ddc84;
    }

    html, body {
      height:100%;
      margin:0;
      background:#000;
      overflow:hidden;
      color:#fff;
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
    }

    *{ box-sizing:border-box; }

    #dashboard-shell{
      position:fixed;
      inset:0;
      background:var(--bg);
      overflow:hidden;
    }

    .zd-stage{
      position:relative;
      width:100%;
      height:100%;
    }

    .zd-frame{
      position:absolute;
      left:50%;
      top:50%;
      width:1920px;
      height:1080px;
      transform:translate(-50%, -50%) scale(1);
      transform-origin:center center;
      will-change:transform;
    }

    .zd-wrap{
      width:100%;
      height:100%;
      padding:22px 30px 26px;
      background:#000;
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .zd-top{
      position:relative;
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      min-height:150px;
      padding:18px 30px;
      border:2px solid var(--gold);
      border-radius:24px;
      overflow:hidden;
      background:
        linear-gradient(rgba(0,0,0,.34), rgba(0,0,0,.34)),
        url("banner.jpg") center center / cover no-repeat;
      box-shadow:
        0 0 0 1px rgba(200,164,91,.12) inset,
        0 18px 40px rgba(0,0,0,.35);
    }

    .zd-top::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg, rgba(0,0,0,.50) 0%, rgba(0,0,0,.14) 30%, rgba(0,0,0,.14) 70%, rgba(0,0,0,.50) 100%);
      pointer-events:none;
    }

    .zd-top-left,
    .zd-clock-wrap,
    .zd-top-right{
      position:relative;
      z-index:1;
    }

    .zd-top-left{
      justify-self:start;
      align-self:center;
    }

    .zd-brand{
      font-size:28px;
      font-weight:900;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--white);
      text-shadow:0 3px 14px rgba(0,0,0,.55);
    }

    .zd-clock-wrap{
      justify-self:center;
      text-align:center;
      transform:translateY(-2px);
    }

    .zd-clock{
      font-size:108px;
      line-height:.88;
      font-weight:900;
      letter-spacing:-0.06em;
      font-variant-numeric:tabular-nums;
      color:#fff;
      text-shadow:0 4px 18px rgba(0,0,0,.55);
    }

    .zd-date{
      margin-top:6px;
      font-size:28px;
      font-weight:800;
      color:var(--gold);
      letter-spacing:.08em;
      font-variant-numeric:tabular-nums;
      text-shadow:0 3px 14px rgba(0,0,0,.55);
    }

    .zd-top-right{
      justify-self:end;
      align-self:center;
      color:transparent;
      user-select:none;
    }

    .zd-main{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns: 420px 1fr 420px;
      gap:22px;
    }

    .zd-col{
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:22px;
    }

    .zd-card{
      min-height:0;
      display:flex;
      flex-direction:column;
      border:2px solid var(--gold);
      border-radius:28px;
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      box-shadow:
        0 0 0 1px rgba(200,164,91,.12) inset,
        0 18px 40px rgba(0,0,0,.35);
      overflow:hidden;
    }

    .zd-side{
      padding:22px 18px 18px;
    }

    .zd-center{
      padding:18px;
    }

    .zd-card-title{
      font-size:30px;
      font-weight:900;
      color:var(--gold);
      letter-spacing:.01em;
      margin-bottom:16px;
    }

    .zd-list{
      display:flex;
      flex-direction:column;
      gap:12px;
      min-height:0;
      overflow:auto;
      padding-right:4px;
    }

    .zd-list::-webkit-scrollbar{
      width:8px;
    }

    .zd-list::-webkit-scrollbar-thumb{
      background:#2b2b2b;
      border-radius:999px;
    }

    .zd-check-item{
      display:flex;
      align-items:center;
      gap:14px;
      min-height:76px;
      padding:16px;
      border:1px solid rgba(200,164,91,.35);
      border-radius:18px;
      background:#070707;
    }

    .zd-check-left{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
      flex:1;
    }

    .zd-dot{
      width:12px;
      height:12px;
      border-radius:999px;
      background:#666;
      flex:0 0 auto;
      box-shadow:0 0 12px rgba(255,255,255,.08);
    }

    .zd-dot.ok{
      background:var(--green);
      box-shadow:0 0 14px rgba(61,220,132,.35);
    }

    .zd-dot.bad{
      background:var(--red);
      box-shadow:0 0 14px rgba(255,77,79,.35);
    }

    .zd-name{
      font-size:31px;
      line-height:1.08;
      font-weight:900;
      letter-spacing:.01em;
    }

    .zd-name.ok{
      color:var(--green);
    }

    .zd-name.bad{
      color:var(--red);
    }

    .zd-actions{
      display:flex;
      flex-direction:column;
      gap:12px;
      min-height:0;
      overflow:auto;
      justify-content:center;
      height:100%;
    }

    .zd-actions::-webkit-scrollbar{
      width:8px;
    }

    .zd-actions::-webkit-scrollbar-thumb{
      background:#2b2b2b;
      border-radius:999px;
    }

    .zd-action{
      display:flex;
      align-items:center;
      gap:16px;
      min-height:74px;
      padding:14px 18px;
      border-radius:18px;
      background:#070707;
      border:1px solid rgba(200,164,91,.35);
    }

    .zd-action .zd-dot{
      width:14px;
      height:14px;
      background:var(--gold);
      box-shadow:0 0 12px rgba(200,164,91,.28);
    }

    .zd-action.pending .zd-dot{
      background:#8b8b8b;
      box-shadow:none;
    }

    .zd-action-text{
      font-size:32px;
      line-height:1.12;
      font-weight:900;
      color:#fff;
      letter-spacing:-0.01em;
    }

    .zd-empty{
      font-size:30px;
      font-weight:700;
      color:#9a9a9a;
      padding:8px 4px;
    }

    .zd-footer{
      text-align:center;
      color:#6d6d6d;
      font-size:17px;
      font-weight:600;
    }
  </style>
</head>
<body>
  <div id="dashboard-shell">
    <div class="zd-stage">
      <div class="zd-frame" id="zd-frame">
        <div class="zd-wrap">

          <div class="zd-top">
            <div class="zd-top-left">
              <div class="zd-brand">Zusje Roermond</div>
            </div>

            <div class="zd-clock-wrap">
              <div class="zd-clock" id="zd-clock">--:--</div>
              <div class="zd-date" id="zd-date">-- -- ----</div>
            </div>

            <div class="zd-top-right">.</div>
          </div>

          <div class="zd-main">
            <div class="zd-col">
              <section class="zd-card zd-side">
                <div class="zd-card-title">Bediening</div>
                <div class="zd-list" id="zd-serviceChecklists"></div>
              </section>
            </div>

            <div class="zd-col">
              <section class="zd-card zd-center" style="flex:1.1;">
                <div class="zd-actions" id="zd-actionsList"></div>
              </section>

              <section class="zd-card zd-center" style="flex:.9;">
                <div class="zd-card-title">Dagnotities en extra taken</div>
                <div class="zd-actions" id="zd-periodicList"></div>
              </section>
            </div>

            <div class="zd-col">
              <section class="zd-card zd-side">
                <div class="zd-card-title">Keuken</div>
                <div class="zd-list" id="zd-kitchenChecklists"></div>
              </section>
            </div>
          </div>

          <div class="zd-footer">Druk op F voor fullscreen</div>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const CONFIG = {
      sheets:{
        checklistsJson:"https://script.google.com/macros/s/AKfycbw_Tn0z0s3AJ7CARzHt9sFy8CGhrCe_HzS9ao0KKDtgzq9TR_H-28WBss316I6PDcr7/exec",
        periodicJson:"https://script.google.com/macros/s/AKfycbxEDSHzBOrrYqkNOCQI6clM6DNuoge55tdATn1XNC63HT7GgPcsZF5AT3dwfaLjEUmV/exec",
        containersJson:"https://script.google.com/macros/s/AKfycbwPQ1WsRqrJmRuYD8bL6kz5H5sSDNcBsIa0z-WW4hain7fkVhM6HIUQI3DHyhpn-C1zHQ/exec"
      },
      refreshMs:15000
    };

    const EMBALLAGE_SCHEDULE = {
      0: ["Bidfood emballage klaarzetten"],
      3: ["Bidfood emballage klaarzetten"],
      5: ["Bidfood emballage klaarzetten"]
    };

    const FALLBACK_CONTAINERS = {
      0: ["Restafval containers klaarzetten"],
      1: ["Glas containers klaarzetten"],
      2: ["Restafval containers klaarzetten"],
      3: [],
      4: ["Papier container klaarzetten"],
      5: [],
      6: []
    };

    const THURSDAY_PLASTIC_LABEL = "Plastic containers klaarzetten";
    const YELLOW_CRATES_START = "2025-11-17";

    const state = {
      checklists: [],
      periodicTasks: [],
      ordersRules: [
        {vendor:"Bidfood", weekdays:[2], deadline:"00:00"},
        {vendor:"Bubbels", weekdays:[3], deadline:"23:00", evenWeeks:true},
        {vendor:"Zusje Kantoor", weekdays:[3], deadline:"23:00", evenWeeks:true},
        {vendor:"Bidfood", weekdays:[4], deadline:"00:00"},
        {vendor:"Bidfood", weekdays:[6], deadline:"00:00"}
      ]
    };

    let containersData = null;

    const $ = (sel)=>document.querySelector(sel);
    const pad = (n)=>String(n).padStart(2,"0");

    const getOpsDate = (d)=>{
      const x = new Date(d || Date.now());
      if(x.getHours() < 4) x.setDate(x.getDate() - 1);
      return x;
    };

    const fmtNumericDate = (d)=>{
      return d.toLocaleDateString("nl-NL",{
        day:"2-digit",
        month:"2-digit",
        year:"numeric"
      });
    };

    const weekNumber = d=>{
      const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const dn = (t.getUTCDay()+6)%7;
      t.setUTCDate(t.getUTCDate()-dn+3);
      const fT = new Date(Date.UTC(t.getUTCFullYear(),0,4));
      return 1 + Math.round(((t-fT)/86400000 - 3 + ((fT.getUTCDay()+6)%7))/7);
    };

    const isEvenWeek = d => weekNumber(d)%2===0;

    const opsDateStrToday = ()=>{
      const d = getOpsDate(new Date());
      return d.toISOString().slice(0,10);
    };

    const ymdInAmsterdam = (dateLike)=>{
      const tz = "Europe/Amsterdam";
      if(!dateLike) return null;

      if(typeof dateLike === "string" && /^\d{4}-\d{2}-\d{2}/.test(dateLike)){
        return dateLike.slice(0,10);
      }

      const d = new Date(dateLike);
      if(isNaN(d)) return null;

      const parts = new Intl.DateTimeFormat("nl-NL",{
        timeZone: tz,
        year:"numeric",
        month:"2-digit",
        day:"2-digit"
      }).formatToParts(d);

      let y,m,da;
      for(const p of parts){
        if(p.type==="year") y=p.value;
        else if(p.type==="month") m=p.value;
        else if(p.type==="day") da=p.value;
      }
      return (y && m && da) ? `${y}-${m}-${da}` : null;
    };

    const normalizeText = (str)=>String(str || "").toLowerCase().replace(/\s+/g," ").trim();

    function displayChecklistName(name){
      const original = String(name || "").trim();
      const n = normalizeText(name);

      if (n.includes("open")) return "Openen";
      if (n.includes("bediening onder")) return "Bediening onder";
      if (n.includes("bediening boven")) return "Bediening boven";
      if (n === "beneden" || n.includes("sluitlijst beneden")) return "Bediening onder";
      if (n === "boven" || n.includes("sluitlijst boven")) return "Bediening boven";
      if (n.includes("run")) return "Run";

      return original.replace(/^Keuken\s*[—-]\s*/i, "").trim();
    }

    function classifyChecklist(name){
      const n = normalizeText(name);

      if (
        n.includes("keuken") ||
        n.includes("spoel") ||
        n.includes("koude kant") ||
        n.includes("bakjeskant") ||
        n.includes("frituur") ||
        n.includes("warme kant") ||
        n.includes("uitgifte") ||
        n.includes("algemeen") ||
        n.includes("bar beneden") ||
        n.includes("bar boven") ||
        n.includes("sluitlijst keuken") ||
        n.includes("sluitlijst spoel")
      ) return "kitchen";

      return "service";
    }

    async function fetchChecklists(){
      try{
        const r = await fetch(CONFIG.sheets.checklistsJson,{cache:"no-store"});
        if(r.ok){
          const j = await r.json();
          if(Array.isArray(j.items)){
            state.checklists = j.items
              .map(it=>({name:String(it.name||"").trim(), done:!!it.done}))
              .filter(x=>x.name);
          }
        }
      }catch(e){
        console.warn("Checklist fetch fail",e);
      }
    }

    async function fetchPeriodic(){
      const u = CONFIG.sheets.periodicJson;
      if(!u) return;
      try{
        const sep = u.includes("?") ? "&" : "?";
        const r = await fetch(u + sep + "tz=Europe/Amsterdam",{cache:"no-store"});
        if(r.ok){
          const j = await r.json();
          let items = (j && j.ok && Array.isArray(j.items)) ? j.items : [];
          const todayStr = opsDateStrToday();

          items = items.filter(ev=>{
            const s = ev.start || ev.startTime || ev.date || ev.dateISO;
            if(!s) return true;
            const evStr = ymdInAmsterdam(s);
            if(!evStr) return false;
            return evStr === todayStr;
          });

          state.periodicTasks = items.map(ev=>({
            title: ev.title,
            allDay: !!ev.allDay,
            start: ev.start || ev.startTime || ev.date || ev.dateISO || null
          }));
        }
      }catch(e){
        console.warn("Periodic fail",e);
      }
    }

    async function fetchContainers(){
      const url = CONFIG.sheets.containersJson;
      if(!url) return null;
      try{
        const sep = url.includes("?") ? "&" : "?";
        const r = await fetch(url + sep + "tz=Europe/Amsterdam",{cache:"no-store"});
        if(!r.ok) throw new Error("HTTP "+r.status);
        return await r.json();
      }catch(e){
        console.warn("Containers endpoint faalde:", e);
        return null;
      }
    }

    async function loadAll(){
      const [a,b,c] = await Promise.allSettled([
        fetchChecklists(),
        fetchPeriodic(),
        fetchContainers()
      ]);
      containersData = (c && c.status==="fulfilled") ? c.value : null;
      renderAll();
    }

    function renderHeader(){
      const n = new Date();
      const ops = getOpsDate(n);
      $("#zd-clock").textContent = `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
      $("#zd-date").textContent = fmtNumericDate(ops);
    }

    function renderChecklistGroup(targetId, items){
      const wrap = document.getElementById(targetId);
      wrap.innerHTML = "";

      if(!items.length){
        wrap.innerHTML = `
          <div class="zd-check-item">
            <div class="zd-check-left">
              <span class="zd-dot bad"></span>
              <div class="zd-name bad">Geen checklists</div>
            </div>
          </div>
        `;
        return;
      }

      items.forEach(c=>{
        const done = !!c.done;
        const dotClass = done ? "ok" : "bad";
        const textClass = done ? "ok" : "bad";

        const el = document.createElement("div");
        el.className = "zd-check-item";
        el.innerHTML = `
          <div class="zd-check-left">
            <span class="zd-dot ${dotClass}"></span>
            <div class="zd-name ${textClass}">${displayChecklistName(c.name)}</div>
          </div>
        `;
        wrap.appendChild(el);
      });
    }

    function renderChecklists(){
      const service = [];
      const kitchen = [];

      state.checklists.forEach(c=>{
        if(classifyChecklist(c.name) === "kitchen") kitchen.push(c);
        else service.push(c);
      });

      const serviceOrder = ["Openen","Bediening onder","Bediening boven","Run"];
      service.sort((a,b)=>{
        const ai = serviceOrder.indexOf(displayChecklistName(a.name));
        const bi = serviceOrder.indexOf(displayChecklistName(b.name));
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      });

      renderChecklistGroup("zd-serviceChecklists", service);
      renderChecklistGroup("zd-kitchenChecklists", kitchen);
    }

    function isYellowCratesDay(ops){
      const start = new Date(YELLOW_CRATES_START + "T00:00:00");
      const msPerDay = 24*60*60*1000;
      const opsMid = new Date(ops);
      opsMid.setHours(0,0,0,0);
      const daysDiff = Math.floor((opsMid - start.getTime())/msPerDay);
      if(daysDiff < 0) return false;
      const weeksDiff = Math.floor(daysDiff / 7);
      return weeksDiff % 2 === 0;
    }

    function buildMainActions(){
      const now = new Date();
      const ops = getOpsDate(now);
      const dow = ops.getDay();
      const todayStr = opsDateStrToday();
      const even = isEvenWeek(ops);

      const actions = [];

      let containers = [];
      if (containersData) {
        if (Array.isArray(containersData.items)) {
          containers = containersData.items
            .filter(it=>{
              const s = it.start || it.startTime || it.date || it.dateISO;
              if(!s) return true;
              const evStr = ymdInAmsterdam(s);
              if(!evStr) return false;
              return evStr === todayStr;
            })
            .map(it=> String(it.title || it.name || "").trim())
            .filter(Boolean);
        } else if (Array.isArray(containersData.containers)) {
          containers = containersData.containers.slice();
        }
      }

      if (containers.length === 0) {
        containers = FALLBACK_CONTAINERS[dow] ? [...FALLBACK_CONTAINERS[dow]] : [];
        if (dow === 4 && even) {
          if(!containers.includes(THURSDAY_PLASTIC_LABEL)) containers.push(THURSDAY_PLASTIC_LABEL);
        }
      }

      containers.forEach(x=>actions.push({label:x, pending:false}));

      const emballage = EMBALLAGE_SCHEDULE[dow] ? [...EMBALLAGE_SCHEDULE[dow]] : [];
      if(dow===1 && isYellowCratesDay(ops)){
        emballage.push("Gele Zusje kratten klaarzetten");
      }
      emballage.forEach(x=>actions.push({label:x, pending:false}));

      const todayOrders = state.ordersRules.filter(r=>(r.weekdays||[]).includes(dow)&&(!r.evenWeeks||even));
      if(!todayOrders.length){
        actions.push({label:"Geen bestellingen", pending:true});
      } else {
        todayOrders.forEach(r=>{
          let limit = new Date(ops);
          if(r.deadline==="00:00"){
            limit.setDate(limit.getDate()+1);
            limit.setHours(0,0,0,0);
          }else{
            const [h,m]=(r.deadline||"23:59").split(":").map(Number);
            limit.setHours(h,m||0,0,0);
          }
          const diff = Math.round((limit-now)/60000);
          let label = `${r.vendor} bestellen`;
          if(diff < 0) label = `${r.vendor} bestellen — te laat`;
          else if(diff <= 60) label = `${r.vendor} bestellen — binnen ${diff} min`;

          actions.push({label, pending:false});
        });
      }

      return actions;
    }

    function renderMainActions(){
      const wrap = $("#zd-actionsList");
      wrap.innerHTML = "";

      const actions = buildMainActions();

      if(!actions.length){
        wrap.innerHTML = `<div class="zd-empty">Geen acties voor vandaag</div>`;
        return;
      }

      actions.forEach(item=>{
        const el = document.createElement("div");
        el.className = "zd-action" + (item.pending ? " pending" : "");
        el.innerHTML = `
          <span class="zd-dot"></span>
          <div class="zd-action-text">${item.label}</div>
        `;
        wrap.appendChild(el);
      });
    }

    function renderPeriodic(){
      const list = $("#zd-periodicList");
      list.innerHTML = "";
      const t = state.periodicTasks || [];

      if(!t.length){
        list.innerHTML = `<div class="zd-empty">Geen dagnotities of extra taken</div>`;
        return;
      }

      t.forEach(x=>{
        const el = document.createElement("div");
        el.className = "zd-action";
        el.innerHTML = `
          <span class="zd-dot"></span>
          <div class="zd-action-text">${x.title}</div>
        `;
        list.appendChild(el);
      });
    }

    function renderAll(){
      renderHeader();
      renderChecklists();
      renderMainActions();
      renderPeriodic();
      fitFrame();
    }

    const FRAME_W = 1920, FRAME_H = 1080, SAFE_MARGIN_PX = 8;

    function fitFrame(){
      const shell = document.getElementById('dashboard-shell');
      const frame = document.getElementById('zd-frame');

      const viewW = Math.max(1, window.innerWidth  || shell.clientWidth  || document.documentElement.clientWidth);
      const viewH = Math.max(1, window.innerHeight || shell.clientHeight || document.documentElement.clientHeight);

      const base = Math.min(
        (viewW - SAFE_MARGIN_PX) / FRAME_W,
        (viewH - SAFE_MARGIN_PX) / FRAME_H
      );

      frame.style.transform = `translate(-50%, -50%) scale(${base * 0.99})`;
    }

    async function toggleFS(){
      try{
        if(document.fullscreenElement){
          await document.exitFullscreen();
        }else{
          const el = document.getElementById('dashboard-shell');
          if(el.requestFullscreen) await el.requestFullscreen();
          else if(document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
        }
      }catch(_){}
    }

    document.addEventListener('keydown', (e)=>{
      if((e.key||'').toLowerCase()==='f') toggleFS();
    });

    window.addEventListener('resize', fitFrame);
    window.addEventListener('orientationchange', fitFrame);
    document.addEventListener('fullscreenchange', fitFrame);
    document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) fitFrame(); });
    if (document.fonts && document.fonts.ready) { document.fonts.ready.finally(fitFrame); }

    fitFrame();
    renderHeader();
    loadAll();
    setInterval(()=>{ renderHeader(); fitFrame(); },1000);
    setInterval(()=>{ loadAll(); }, CONFIG.refreshMs);
  })();
  </script>
</body>
</html>
