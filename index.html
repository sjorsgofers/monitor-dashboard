<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920, initial-scale=1" />
  <title>Zusje Roermond Dashboard</title>
  <style>
    :root{
      --bg:#050403;
      --bg-deep:#000000;
      --panel:rgba(18,14,10,0.55);
      --panel-2:rgba(8,6,4,0.75);
      --gold:#c8a45b;
      --gold-bright:#f0d28a;
      --gold-deep:#7a5e2e;
      --white:#ffffff;
      --muted:#a9a39a;
      --red:#ff4d4f;
      --red-glow:rgba(255,77,79,.55);
      --green:#3ddc84;
      --green-glow:rgba(61,220,132,.55);
      --glass-border:rgba(200,164,91,.35);
      --glass-border-soft:rgba(200,164,91,.18);
    }

    *{ box-sizing:border-box; }

    html, body {
      height:100%;
      margin:0;
      background:var(--bg-deep);
      overflow:hidden;
      color:#fff;
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
    }

    /* ===== Animated background ===== */
    #dashboard-shell{
      position:fixed;
      inset:0;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(200,164,91,.12), transparent 55%),
        radial-gradient(ellipse at 100% 100%, rgba(200,164,91,.08), transparent 50%),
        linear-gradient(180deg, #0a0805 0%, #000 100%);
      overflow:hidden;
    }

    #dashboard-shell::before,
    #dashboard-shell::after{
      content:"";
      position:absolute;
      width:900px;
      height:900px;
      border-radius:50%;
      filter:blur(120px);
      opacity:.35;
      pointer-events:none;
      z-index:0;
    }

    #dashboard-shell::before{
      top:-200px;
      left:-200px;
      background:radial-gradient(circle, rgba(200,164,91,.55), transparent 60%);
      animation:orb-a 22s ease-in-out infinite;
    }

    #dashboard-shell::after{
      bottom:-300px;
      right:-200px;
      background:radial-gradient(circle, rgba(200,164,91,.40), transparent 60%);
      animation:orb-b 28s ease-in-out infinite;
    }

    @keyframes orb-a{
      0%,100%{ transform:translate(0,0) scale(1); }
      50%   { transform:translate(180px,120px) scale(1.15); }
    }
    @keyframes orb-b{
      0%,100%{ transform:translate(0,0) scale(1); }
      50%   { transform:translate(-220px,-140px) scale(1.1); }
    }

    /* Subtle grain overlay */
    #dashboard-shell .grain{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:1;
      opacity:.06;
      mix-blend-mode:overlay;
      background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,.04) 0 1px, transparent 1px 3px);
    }

    .zd-stage{
      position:relative;
      width:100%;
      height:100%;
      z-index:2;
    }

    .zd-frame{
      position:absolute;
      left:50%;
      top:50%;
      width:1920px;
      height:1080px;
      transform:translate(-50%, -50%) scale(1);
      transform-origin:center center;
      will-change:transform;
    }

    .zd-wrap{
      width:100%;
      height:100%;
      padding:22px 30px 24px;
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    /* ===== Top banner ===== */
    .zd-top{
      position:relative;
      min-height:170px;
      padding:18px 36px;
      border-radius:24px;
      overflow:hidden;
      background:
        linear-gradient(rgba(0,0,0,.42), rgba(0,0,0,.42)),
        url("banner.jpg") center center / cover no-repeat;
      box-shadow:
        0 18px 50px rgba(0,0,0,.55),
        0 0 60px rgba(200,164,91,.10);
    }

    /* Gold gradient frame using mask trick */
    .zd-top::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:24px;
      padding:2px;
      background:linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 35%, var(--gold-deep) 65%, var(--gold) 100%);
      -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
              mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
              mask-composite:exclude;
      pointer-events:none;
      background-size:200% 200%;
      animation:gold-shift 14s ease-in-out infinite;
    }

    @keyframes gold-shift{
      0%,100%{ background-position:0% 50%; }
      50%   { background-position:100% 50%; }
    }

    .zd-top::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, rgba(0,0,0,.55) 0%, rgba(0,0,0,.05) 28%, rgba(0,0,0,.05) 72%, rgba(0,0,0,.55) 100%);
      pointer-events:none;
    }

    .zd-top-left,
    .zd-clock-center,
    .zd-date-right{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      z-index:2;
      display:flex;
      align-items:center;
    }

    .zd-top-left{ left:36px; max-width:36%; }

    .zd-clock-center{
      left:50%;
      transform:translate(-50%, -50%);
      justify-content:center;
      text-align:center;
      width:max-content;
      flex-direction:column;
      gap:4px;
    }

    .zd-date-right{ right:36px; justify-content:flex-end; text-align:right; flex-direction:column; align-items:flex-end; gap:4px; }

    .zd-logo{
      display:block;
      height:140px;
      width:auto;
      max-width:520px;
      object-fit:contain;
      filter: drop-shadow(0 4px 22px rgba(0,0,0,.55)) drop-shadow(0 0 18px rgba(200,164,91,.20));
    }

    .zd-clock{
      font-size:108px;
      line-height:.88;
      font-weight:900;
      letter-spacing:-0.06em;
      font-variant-numeric:tabular-nums;
      color:#fff;
      text-shadow:0 4px 22px rgba(0,0,0,.6), 0 0 30px rgba(200,164,91,.18);
      white-space:nowrap;
    }

    .zd-clock .colon{
      display:inline-block;
      animation:blink 1s steps(2,end) infinite;
      color:var(--gold-bright);
    }

    @keyframes blink{
      0%,50%{ opacity:1; }
      51%,100%{ opacity:.25; }
    }

    .zd-clock-label,
    .zd-date-label{
      font-size:14px;
      font-weight:700;
      letter-spacing:.32em;
      text-transform:uppercase;
      color:var(--gold-bright);
      opacity:.85;
    }

    .zd-date-value{
      font-size:108px;
      line-height:.88;
      font-weight:900;
      letter-spacing:-0.04em;
      font-variant-numeric:tabular-nums;
      background:linear-gradient(180deg, #fff3d6 0%, var(--gold-bright) 45%, var(--gold) 100%);
      -webkit-background-clip:text;
              background-clip:text;
      -webkit-text-fill-color:transparent;
      filter:drop-shadow(0 4px 22px rgba(0,0,0,.55));
      white-space:nowrap;
    }

    /* ===== Main grid ===== */
    .zd-main{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns: 420px 1fr 420px;
      gap:22px;
    }

    .zd-col{
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:22px;
    }

    /* ===== Cards (glassmorphism + gradient gold border) ===== */
    .zd-card{
      position:relative;
      min-height:0;
      display:flex;
      flex-direction:column;
      border-radius:28px;
      background:linear-gradient(180deg, var(--panel), var(--panel-2));
      backdrop-filter:blur(14px) saturate(115%);
      -webkit-backdrop-filter:blur(14px) saturate(115%);
      box-shadow:
        0 20px 50px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.04);
      overflow:hidden;
    }

    .zd-card::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:28px;
      padding:2px;
      background:linear-gradient(160deg, var(--gold-bright) 0%, var(--gold) 30%, rgba(200,164,91,.20) 60%, var(--gold) 100%);
      -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
              mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
              mask-composite:exclude;
      pointer-events:none;
      opacity:.85;
    }

    /* Soft gold glow halo around active cards */
    .zd-card::after{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius:28px;
      box-shadow:0 0 60px rgba(200,164,91,.06);
      pointer-events:none;
    }

    .zd-side{ padding:24px 20px 20px; }
    .zd-center{ padding:22px; }

    .zd-card-title{
      position:relative;
      font-size:30px;
      font-weight:900;
      color:var(--gold-bright);
      letter-spacing:.04em;
      text-transform:uppercase;
      margin-bottom:18px;
      display:flex;
      align-items:center;
      gap:14px;
    }

    .zd-card-title::after{
      content:"";
      flex:1;
      height:2px;
      background:linear-gradient(90deg, var(--gold) 0%, transparent 100%);
      border-radius:2px;
      opacity:.6;
    }

    .zd-card-icon{
      width:34px;
      height:34px;
      border-radius:10px;
      background:linear-gradient(135deg, rgba(200,164,91,.25), rgba(200,164,91,.05));
      border:1px solid rgba(200,164,91,.4);
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      color:var(--gold-bright);
    }

    .zd-card-icon svg{ width:18px; height:18px; }

    /* ===== Lists ===== */
    .zd-list{
      display:flex;
      flex-direction:column;
      gap:12px;
      min-height:0;
      overflow:auto;
      padding-right:4px;
    }

    .zd-list::-webkit-scrollbar,
    .zd-actions::-webkit-scrollbar{ width:8px; }
    .zd-list::-webkit-scrollbar-thumb,
    .zd-actions::-webkit-scrollbar-thumb{
      background:linear-gradient(180deg, var(--gold), var(--gold-deep));
      border-radius:999px;
    }

    /* ===== Check items ===== */
    .zd-check-item{
      position:relative;
      display:flex;
      align-items:center;
      gap:16px;
      min-height:78px;
      padding:14px 18px;
      border-radius:18px;
      background:linear-gradient(135deg, rgba(255,255,255,.025), rgba(255,255,255,0));
      border:1px solid var(--glass-border-soft);
      overflow:hidden;
      animation:fade-up .5s ease-out both;
    }

    .zd-check-item::before{
      content:"";
      position:absolute;
      left:0; top:0; bottom:0;
      width:4px;
      background:rgba(200,164,91,.25);
    }

    .zd-check-item.is-ok::before{ background:linear-gradient(180deg, var(--green), #1faa5b); box-shadow:0 0 16px var(--green-glow); }
    .zd-check-item.is-bad::before{ background:linear-gradient(180deg, var(--red), #c0282a); box-shadow:0 0 16px var(--red-glow); }

    .zd-check-left{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
      flex:1;
    }

    .zd-status-icon{
      width:42px;
      height:42px;
      border-radius:50%;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .zd-status-icon svg{ width:22px; height:22px; }

    .is-ok .zd-status-icon{
      background:radial-gradient(circle at 30% 30%, rgba(61,220,132,.35), rgba(61,220,132,.05) 70%);
      border:2px solid var(--green);
      color:var(--green);
      box-shadow:0 0 24px rgba(61,220,132,.35), inset 0 0 12px rgba(61,220,132,.2);
      animation:pulse-green 2.4s ease-out infinite;
    }

    .is-bad .zd-status-icon{
      background:radial-gradient(circle at 30% 30%, rgba(255,77,79,.35), rgba(255,77,79,.05) 70%);
      border:2px solid var(--red);
      color:var(--red);
      box-shadow:0 0 24px rgba(255,77,79,.35), inset 0 0 12px rgba(255,77,79,.2);
      animation:pulse-red 2.0s ease-out infinite;
    }

    @keyframes pulse-green{
      0%   { box-shadow:0 0 0 0 rgba(61,220,132,.45), inset 0 0 12px rgba(61,220,132,.2); }
      80%  { box-shadow:0 0 0 14px rgba(61,220,132,0), inset 0 0 12px rgba(61,220,132,.2); }
      100% { box-shadow:0 0 0 0 rgba(61,220,132,0), inset 0 0 12px rgba(61,220,132,.2); }
    }

    @keyframes pulse-red{
      0%   { box-shadow:0 0 0 0 rgba(255,77,79,.55), inset 0 0 12px rgba(255,77,79,.2); }
      80%  { box-shadow:0 0 0 14px rgba(255,77,79,0), inset 0 0 12px rgba(255,77,79,.2); }
      100% { box-shadow:0 0 0 0 rgba(255,77,79,0), inset 0 0 12px rgba(255,77,79,.2); }
    }

    .zd-name{
      font-size:30px;
      line-height:1.08;
      font-weight:900;
      letter-spacing:.005em;
    }
    .zd-name.ok { color:var(--green); text-shadow:0 0 18px rgba(61,220,132,.18); }
    .zd-name.bad{ color:var(--red);   text-shadow:0 0 18px rgba(255,77,79,.18); }

    /* ===== Actions ===== */
    .zd-actions{
      display:flex;
      flex-direction:column;
      gap:12px;
      min-height:0;
      overflow:auto;
    }

    /* Center column: cards size to content, not column height */
    .zd-center-flex{
      flex:0 1 auto;
    }

    .zd-action{
      position:relative;
      display:flex;
      align-items:center;
      gap:18px;
      min-height:74px;
      padding:14px 22px 14px 20px;
      border-radius:18px;
      background:linear-gradient(135deg, rgba(200,164,91,.10), rgba(255,255,255,.01));
      border:1px solid var(--glass-border);
      overflow:hidden;
      animation:fade-up .5s ease-out both;
    }

    .zd-action::before{
      content:"";
      position:absolute;
      left:0; top:0; bottom:0;
      width:4px;
      background:linear-gradient(180deg, var(--gold-bright), var(--gold-deep));
      box-shadow:0 0 16px rgba(200,164,91,.35);
    }

    .zd-action.pending{
      background:linear-gradient(135deg, rgba(255,255,255,.025), rgba(255,255,255,0));
      border-color:rgba(140,140,140,.25);
    }
    .zd-action.pending::before{
      background:#5a5a5a;
      box-shadow:none;
    }

    .zd-action .zd-dot{
      width:14px;
      height:14px;
      border-radius:50%;
      background:radial-gradient(circle, var(--gold-bright) 0%, var(--gold) 60%, var(--gold-deep) 100%);
      flex:0 0 auto;
      box-shadow:0 0 16px rgba(200,164,91,.55);
    }
    .zd-action.pending .zd-dot{
      background:#7a7a7a;
      box-shadow:none;
    }

    .zd-action-text{
      font-size:32px;
      line-height:1.12;
      font-weight:900;
      color:#fff;
      letter-spacing:-0.005em;
      text-shadow:0 2px 14px rgba(0,0,0,.5);
    }

    .zd-action-text .late{
      color:var(--red);
      text-shadow:0 0 16px rgba(255,77,79,.4);
    }
    .zd-action-text .soon{
      color:var(--gold-bright);
      text-shadow:0 0 16px rgba(200,164,91,.4);
    }

    .zd-empty{
      font-size:28px;
      font-weight:700;
      color:var(--muted);
      padding:14px 6px;
      text-align:center;
      letter-spacing:.02em;
    }

    /* ===== Footer ===== */
    .zd-footer{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      color:#7c7368;
      font-size:14px;
      font-weight:700;
      letter-spacing:.32em;
      text-transform:uppercase;
    }
    .zd-footer .kbd{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:22px;
      height:22px;
      padding:0 7px;
      border-radius:6px;
      border:1px solid rgba(200,164,91,.45);
      background:rgba(200,164,91,.08);
      color:var(--gold-bright);
      font-size:12px;
      letter-spacing:0;
    }

    /* ===== Animations ===== */
    @keyframes fade-up{
      from{ opacity:0; transform:translateY(10px); }
      to  { opacity:1; transform:translateY(0); }
    }

    /* Stagger children */
    .zd-list > *:nth-child(1),
    .zd-actions > *:nth-child(1){ animation-delay:.04s; }
    .zd-list > *:nth-child(2),
    .zd-actions > *:nth-child(2){ animation-delay:.10s; }
    .zd-list > *:nth-child(3),
    .zd-actions > *:nth-child(3){ animation-delay:.16s; }
    .zd-list > *:nth-child(4),
    .zd-actions > *:nth-child(4){ animation-delay:.22s; }
    .zd-list > *:nth-child(5),
    .zd-actions > *:nth-child(5){ animation-delay:.28s; }
    .zd-list > *:nth-child(6),
    .zd-actions > *:nth-child(6){ animation-delay:.34s; }
    .zd-list > *:nth-child(7),
    .zd-actions > *:nth-child(7){ animation-delay:.40s; }
    .zd-list > *:nth-child(n+8),
    .zd-actions > *:nth-child(n+8){ animation-delay:.46s; }
  </style>
</head>
<body>
  <div id="dashboard-shell">
    <div class="grain"></div>
    <div class="zd-stage">
      <div class="zd-frame" id="zd-frame">
        <div class="zd-wrap">

          <div class="zd-top">
            <div class="zd-top-left">
              <img src="logo.png" alt="'t Zusje Roermond" class="zd-logo">
            </div>

            <div class="zd-clock-center">
              <div class="zd-clock-label">Tijd</div>
              <div class="zd-clock" id="zd-clock">--<span class="colon">:</span>--</div>
            </div>

            <div class="zd-date-right">
              <div class="zd-date-label">Datum</div>
              <div class="zd-date-value" id="zd-date">-- --</div>
            </div>
          </div>

          <div class="zd-main">
            <div class="zd-col">
              <section class="zd-card zd-side">
                <div class="zd-card-title">
                  <span class="zd-card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
                  </span>
                  Bediening
                </div>
                <div class="zd-list" id="zd-serviceChecklists"></div>
              </section>
            </div>

            <div class="zd-col">
              <section class="zd-card zd-center zd-center-flex">
                <div class="zd-card-title">
                  <span class="zd-card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h7l-1 8 11-14h-7l1-6z"/></svg>
                  </span>
                  Acties van vandaag
                </div>
                <div class="zd-actions" id="zd-actionsList"></div>
              </section>

              <section class="zd-card zd-center zd-center-flex">
                <div class="zd-card-title">
                  <span class="zd-card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                  </span>
                  Dagnotities &amp; extra taken
                </div>
                <div class="zd-actions" id="zd-periodicList"></div>
              </section>
            </div>

            <div class="zd-col">
              <section class="zd-card zd-side">
                <div class="zd-card-title">
                  <span class="zd-card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2v8a4 4 0 008 0V2M10 14v8M4 22h12"/></svg>
                  </span>
                  Keuken
                </div>
                <div class="zd-list" id="zd-kitchenChecklists"></div>
              </section>
            </div>
          </div>

          <div class="zd-footer">
            <span>Druk op</span>
            <span class="kbd">F</span>
            <span>voor fullscreen</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const CONFIG = {
      sheets:{
        checklistsJson:"https://script.google.com/macros/s/AKfycbw_Tn0z0s3AJ7CARzHt9sFy8CGhrCe_HzS9ao0KKDtgzq9TR_H-28WBss316I6PDcr7/exec",
        periodicJson:"https://script.google.com/macros/s/AKfycbxEDSHzBOrrYqkNOCQI6clM6DNuoge55tdATn1XNC63HT7GgPcsZF5AT3dwfaLjEUmV/exec",
        containersJson:"https://script.google.com/macros/s/AKfycbwPQ1WsRqrJmRuYD8bL6kz5H5sSDNcBsIa0z-WW4hain7fkVhM6HIUQI3DHyhpn-C1zHQ/exec"
      },
      refreshMs:15000
    };

    const EMBALLAGE_SCHEDULE = {
      0: ["Bidfood emballage klaarzetten"],
      3: ["Bidfood emballage klaarzetten"],
      5: ["Bidfood emballage klaarzetten"]
    };

    const FALLBACK_CONTAINERS = {
      0: ["Restafval containers klaarzetten"],
      1: ["Glas containers klaarzetten"],
      2: ["Restafval containers klaarzetten"],
      3: [],
      4: ["Papier container klaarzetten"],
      5: [],
      6: []
    };

    const THURSDAY_PLASTIC_LABEL = "Plastic containers klaarzetten";
    const YELLOW_CRATES_START = "2025-11-17";

    const state = {
      checklists: [],
      periodicTasks: [],
      ordersRules: [
        {vendor:"Bidfood", weekdays:[2], deadline:"00:00"},
        {vendor:"Bubbels", weekdays:[3], deadline:"23:00", evenWeeks:true},
        {vendor:"Zusje Kantoor", weekdays:[3], deadline:"23:00", evenWeeks:true},
        {vendor:"Bidfood", weekdays:[4], deadline:"00:00"},
        {vendor:"Bidfood", weekdays:[6], deadline:"00:00"}
      ]
    };

    let containersData = null;

    const $ = (sel)=>document.querySelector(sel);
    const pad = (n)=>String(n).padStart(2,"0");

    const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
    const ICON_CROSS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>';

    const getOpsDate = (d)=>{
      const x = new Date(d || Date.now());
      if(x.getHours() < 4) x.setDate(x.getDate() - 1);
      return x;
    };

    const fmtShortDate = (d)=>{
      return d.toLocaleDateString("nl-NL",{
        day:"2-digit",
        month:"2-digit"
      });
    };

    const weekNumber = d=>{
      const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const dn = (t.getUTCDay()+6)%7;
      t.setUTCDate(t.getUTCDate()-dn+3);
      const fT = new Date(Date.UTC(t.getUTCFullYear(),0,4));
      return 1 + Math.round(((t-fT)/86400000 - 3 + ((fT.getUTCDay()+6)%7))/7);
    };

    const isEvenWeek = d => weekNumber(d)%2===0;

    const opsDateStrToday = ()=>{
      const d = getOpsDate(new Date());
      return d.toISOString().slice(0,10);
    };

    const ymdInAmsterdam = (dateLike)=>{
      const tz = "Europe/Amsterdam";
      if(!dateLike) return null;

      if(typeof dateLike === "string" && /^\d{4}-\d{2}-\d{2}/.test(dateLike)){
        return dateLike.slice(0,10);
      }

      const d = new Date(dateLike);
      if(isNaN(d)) return null;

      const parts = new Intl.DateTimeFormat("nl-NL",{
        timeZone: tz,
        year:"numeric",
        month:"2-digit",
        day:"2-digit"
      }).formatToParts(d);

      let y,m,da;
      for(const p of parts){
        if(p.type==="year") y=p.value;
        else if(p.type==="month") m=p.value;
        else if(p.type==="day") da=p.value;
      }
      return (y && m && da) ? `${y}-${m}-${da}` : null;
    };

    const normalizeText = (str)=>String(str || "").toLowerCase().replace(/\s+/g," ").trim();

    function displayChecklistName(name){
      const original = String(name || "").trim();
      const n = normalizeText(name);

      if (n.includes("open")) return "Openen";
      if (n.includes("bediening onder")) return "Bediening onder";
      if (n.includes("bediening boven")) return "Bediening boven";
      if (n === "beneden" || n.includes("sluitlijst beneden")) return "Bediening onder";
      if (n === "boven" || n.includes("sluitlijst boven")) return "Bediening boven";
      if (n.includes("run")) return "Run";

      return original.replace(/^Keuken\s*[—-]\s*/i, "").trim();
    }

    function classifyChecklist(name){
      const n = normalizeText(name);

      if (
        n.includes("keuken") ||
        n.includes("spoel") ||
        n.includes("koude kant") ||
        n.includes("bakjeskant") ||
        n.includes("frituur") ||
        n.includes("warme kant") ||
        n.includes("uitgifte") ||
        n.includes("algemeen") ||
        n.includes("bar beneden") ||
        n.includes("bar boven") ||
        n.includes("sluitlijst keuken") ||
        n.includes("sluitlijst spoel")
      ) return "kitchen";

      return "service";
    }

    async function fetchChecklists(){
      try{
        const r = await fetch(CONFIG.sheets.checklistsJson,{cache:"no-store"});
        if(r.ok){
          const j = await r.json();
          if(Array.isArray(j.items)){
            state.checklists = j.items
              .map(it=>({name:String(it.name||"").trim(), done:!!it.done}))
              .filter(x=>x.name);
          }
        }
      }catch(e){
        console.warn("Checklist fetch fail",e);
      }
    }

    async function fetchPeriodic(){
      const u = CONFIG.sheets.periodicJson;
      if(!u) return;
      try{
        const sep = u.includes("?") ? "&" : "?";
        const r = await fetch(u + sep + "tz=Europe/Amsterdam",{cache:"no-store"});
        if(r.ok){
          const j = await r.json();
          let items = (j && j.ok && Array.isArray(j.items)) ? j.items : [];
          const todayStr = opsDateStrToday();

          items = items.filter(ev=>{
            const s = ev.start || ev.startTime || ev.date || ev.dateISO;
            if(!s) return true;
            const evStr = ymdInAmsterdam(s);
            if(!evStr) return false;
            return evStr === todayStr;
          });

          state.periodicTasks = items.map(ev=>({
            title: ev.title,
            allDay: !!ev.allDay,
            start: ev.start || ev.startTime || ev.date || ev.dateISO || null
          }));
        }
      }catch(e){
        console.warn("Periodic fail",e);
      }
    }

    async function fetchContainers(){
      const url = CONFIG.sheets.containersJson;
      if(!url) return null;
      try{
        const sep = url.includes("?") ? "&" : "?";
        const r = await fetch(url + sep + "tz=Europe/Amsterdam",{cache:"no-store"});
        if(!r.ok) throw new Error("HTTP "+r.status);
        return await r.json();
      }catch(e){
        console.warn("Containers endpoint faalde:", e);
        return null;
      }
    }

    async function loadAll(){
      const [a,b,c] = await Promise.allSettled([
        fetchChecklists(),
        fetchPeriodic(),
        fetchContainers()
      ]);
      containersData = (c && c.status==="fulfilled") ? c.value : null;
      renderAll();
    }

    function renderHeader(){
      const n = new Date();
      const ops = getOpsDate(n);
      $("#zd-clock").innerHTML = `${pad(n.getHours())}<span class="colon">:</span>${pad(n.getMinutes())}<span class="colon">:</span>${pad(n.getSeconds())}`;
      $("#zd-date").textContent = fmtShortDate(ops);
    }

    function renderChecklistGroup(targetId, items){
      const wrap = document.getElementById(targetId);
      wrap.innerHTML = "";

      if(!items.length){
        wrap.innerHTML = `
          <div class="zd-check-item is-bad">
            <div class="zd-check-left">
              <span class="zd-status-icon">${ICON_CROSS}</span>
              <div class="zd-name bad">Geen checklists</div>
            </div>
          </div>
        `;
        return;
      }

      items.forEach(c=>{
        const done = !!c.done;
        const stateClass = done ? "is-ok" : "is-bad";
        const textClass = done ? "ok" : "bad";
        const icon = done ? ICON_CHECK : ICON_CROSS;

        const el = document.createElement("div");
        el.className = `zd-check-item ${stateClass}`;
        el.innerHTML = `
          <div class="zd-check-left">
            <span class="zd-status-icon">${icon}</span>
            <div class="zd-name ${textClass}">${displayChecklistName(c.name)}</div>
          </div>
        `;
        wrap.appendChild(el);
      });
    }

    function renderChecklists(){
      const service = [];
      const kitchen = [];

      state.checklists.forEach(c=>{
        if(classifyChecklist(c.name) === "kitchen") kitchen.push(c);
        else service.push(c);
      });

      const serviceOrder = ["Openen","Bediening onder","Bediening boven","Run"];
      service.sort((a,b)=>{
        const ai = serviceOrder.indexOf(displayChecklistName(a.name));
        const bi = serviceOrder.indexOf(displayChecklistName(b.name));
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      });

      renderChecklistGroup("zd-serviceChecklists", service);
      renderChecklistGroup("zd-kitchenChecklists", kitchen);
    }

    function isYellowCratesDay(ops){
      const start = new Date(YELLOW_CRATES_START + "T00:00:00");
      const msPerDay = 24*60*60*1000;
      const opsMid = new Date(ops);
      opsMid.setHours(0,0,0,0);
      const daysDiff = Math.floor((opsMid - start.getTime())/msPerDay);
      if(daysDiff < 0) return false;
      const weeksDiff = Math.floor(daysDiff / 7);
      return weeksDiff % 2 === 0;
    }

    function buildMainActions(){
      const now = new Date();
      const ops = getOpsDate(now);
      const dow = ops.getDay();
      const todayStr = opsDateStrToday();
      const even = isEvenWeek(ops);

      const actions = [];

      let containers = [];
      if (containersData) {
        if (Array.isArray(containersData.items)) {
          containers = containersData.items
            .filter(it=>{
              const s = it.start || it.startTime || it.date || it.dateISO;
              if(!s) return true;
              const evStr = ymdInAmsterdam(s);
              if(!evStr) return false;
              return evStr === todayStr;
            })
            .map(it=> String(it.title || it.name || "").trim())
            .filter(Boolean);
        } else if (Array.isArray(containersData.containers)) {
          containers = containersData.containers.slice();
        }
      }

      if (containers.length === 0) {
        containers = FALLBACK_CONTAINERS[dow] ? [...FALLBACK_CONTAINERS[dow]] : [];
        if (dow === 4 && even) {
          if(!containers.includes(THURSDAY_PLASTIC_LABEL)) containers.push(THURSDAY_PLASTIC_LABEL);
        }
      }

      containers.forEach(x=>actions.push({label:x, pending:false}));

      const emballage = EMBALLAGE_SCHEDULE[dow] ? [...EMBALLAGE_SCHEDULE[dow]] : [];
      if(dow===1 && isYellowCratesDay(ops)){
        emballage.push("Gele Zusje kratten klaarzetten");
      }
      emballage.forEach(x=>actions.push({label:x, pending:false}));

      const todayOrders = state.ordersRules.filter(r=>(r.weekdays||[]).includes(dow)&&(!r.evenWeeks||even));
      if(!todayOrders.length){
        actions.push({label:"Geen bestellingen", pending:true});
      } else {
        todayOrders.forEach(r=>{
          let limit = new Date(ops);
          if(r.deadline==="00:00"){
            limit.setDate(limit.getDate()+1);
            limit.setHours(0,0,0,0);
          }else{
            const [h,m]=(r.deadline||"23:59").split(":").map(Number);
            limit.setHours(h,m||0,0,0);
          }
          const diff = Math.round((limit-now)/60000);
          let label = `${r.vendor} bestellen`;
          if(diff < 0) label = `${r.vendor} bestellen <span class="late">— te laat</span>`;
          else if(diff <= 60) label = `${r.vendor} bestellen <span class="soon">— binnen ${diff} min</span>`;

          actions.push({label, pending:false, html:true});
        });
      }

      return actions;
    }

    function renderMainActions(){
      const wrap = $("#zd-actionsList");
      wrap.innerHTML = "";

      const actions = buildMainActions();

      if(!actions.length){
        wrap.innerHTML = `<div class="zd-empty">Geen acties voor vandaag</div>`;
        return;
      }

      actions.forEach(item=>{
        const el = document.createElement("div");
        el.className = "zd-action" + (item.pending ? " pending" : "");
        el.innerHTML = `
          <span class="zd-dot"></span>
          <div class="zd-action-text">${item.label}</div>
        `;
        wrap.appendChild(el);
      });
    }

    function renderPeriodic(){
      const list = $("#zd-periodicList");
      list.innerHTML = "";
      const t = state.periodicTasks || [];

      if(!t.length){
        list.innerHTML = `<div class="zd-empty">Geen dagnotities of extra taken</div>`;
        return;
      }

      t.forEach(x=>{
        const el = document.createElement("div");
        el.className = "zd-action";
        el.innerHTML = `
          <span class="zd-dot"></span>
          <div class="zd-action-text">${x.title}</div>
        `;
        list.appendChild(el);
      });
    }

    function renderAll(){
      renderHeader();
      renderChecklists();
      renderMainActions();
      renderPeriodic();
      fitFrame();
    }

    const FRAME_W = 1920, FRAME_H = 1080, SAFE_MARGIN_PX = 8;

    function fitFrame(){
      const shell = document.getElementById('dashboard-shell');
      const frame = document.getElementById('zd-frame');

      const viewW = Math.max(1, window.innerWidth  || shell.clientWidth  || document.documentElement.clientWidth);
      const viewH = Math.max(1, window.innerHeight || shell.clientHeight || document.documentElement.clientHeight);

      const base = Math.min(
        (viewW - SAFE_MARGIN_PX) / FRAME_W,
        (viewH - SAFE_MARGIN_PX) / FRAME_H
      );

      frame.style.transform = `translate(-50%, -50%) scale(${base * 0.99})`;
    }

    async function toggleFS(){
      try{
        if(document.fullscreenElement){
          await document.exitFullscreen();
        }else{
          const el = document.getElementById('dashboard-shell');
          if(el.requestFullscreen) await el.requestFullscreen();
          else if(document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
        }
      }catch(_){}
    }

    document.addEventListener('keydown', (e)=>{
      if((e.key||'').toLowerCase()==='f') toggleFS();
    });

    window.addEventListener('resize', fitFrame);
    window.addEventListener('orientationchange', fitFrame);
    document.addEventListener('fullscreenchange', fitFrame);
    document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) fitFrame(); });
    if (document.fonts && document.fonts.ready) { document.fonts.ready.finally(fitFrame); }

    fitFrame();
    renderHeader();
    loadAll();
    setInterval(()=>{ renderHeader(); fitFrame(); },1000);
    setInterval(()=>{ loadAll(); }, CONFIG.refreshMs);
  })();
  </script>
</body>
</html>
